<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Junior Dev Showcase</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Contact the Developer</h1>
        <a href="#main-content" class="skip-link">Skip to main content</a>
        
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Me</a></li>
            <li><a href="data.html">Project Data</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main id="main-content">
        <section>
            <h2>Project Inquiry</h2>
            <p>Have questions about my Multilingual TTS Python project? Send me a message below.</p>
            
            <form action="#" method="post">
                <fieldset>
                    <legend>Contact Information</legend>
                    
                    <div class="form-group">
                        <label for="user-name">Full Name:</label>
                        <input type="text" id="user-name" name="user-name" required>
                    </div>

                    <div class="form-group">
                        <label for="user-email">Email Address:</label>
                        <input type="email" id="user-email" name="user-email" required>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Message Details</legend>

                    <div class="form-group">
                        <label for="subject">Subject:</label>
                        <select id="subject" name="subject">
                            <option value="general">General Inquiry</option>
                            <option value="python">Python Logic Question</option>
                            <option value="audio">Audio/TTS Feedback</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="message">Your Message:</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>

                    <button type="submit">Send Message</button>
                </fieldset>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Junior Dev Showcase.</p>
    </footer>

</body>
</html>
